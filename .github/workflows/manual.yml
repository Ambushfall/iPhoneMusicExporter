name: "Manual XCODEBUILD iOS"


on:
    workflow_call:
        inputs:
            environment:
                required: true
                type: string
            publish:
                required: false
                type: boolean
                description: Build iOS APP
        secrets:
            NEW_SIGNING_KEY_PASSWORD:
                required: true
            PROVISION_PROFILES_BASE64:
                required: true
            NEW_P12_BASE64:
                required: true
            KEYCHAIN_PASSWORD:
                required: true
            EXPORT_OPTIONS_PLIST:
                required: true
            APP_STORE_CONNECT_API_KEY_ID:
                required: true
            APP_STORE_CONNECT_API_KEY_ISSUER_ID:
                required: true
            APP_STORE_CONNECT_API_KEY_BASE64:
                required: true
            IOS_BUNDLE_ID:
                required: true
            IOS_TEAM_ID:
                required: true
            SCHEME:
                required: true
            WORKSPACE:
                required: true
            XCARCHIVE_NAME:
                required: true

jobs:
    build-ios-with-signing:
        runs-on: macos-latest #Monterey
        steps:

            -   name: Check XCode Version
                run: /usr/bin/xcodebuild -version

            -   uses: actions/checkout@v3

            -   name: Debug Workflow Variables
                run: |
                    echo "CERTIFICATE_PATH: $CERTIFICATE_PATH"
                    echo "PP_PATH: $PP_PATH"
                    echo "KEYCHAIN_PATH: $KEYCHAIN_PATH"
                    echo "P12_PASSWORD: $P12_PASSWORD"

            -   name: Install the Apple certificate and provisioning profile
                env:
                    BUILD_CERTIFICATE_BASE64: ${{ secrets.NEW_P12_BASE64 }}
                    P12_PASSWORD: ${{ secrets.NEW_SIGNING_KEY_PASSWORD }}
                    PROVISION_PROFILES_BASE64: ${{ secrets.PROVISION_PROFILES_BASE64 }}
                    KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
                run: |
                    CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
                    PP_ARCHIVE=$RUNNER_TEMP/mobile_pp.tgz
                    KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
                    
                    echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
                    echo -n "$PROVISION_PROFILES_BASE64" | base64 --decode -o $PP_ARCHIVE
                    
                    security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                    security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
                    security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                    
                    echo "P12_PASSWORD: $P12_PASSWORD"
                    security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
                    security list-keychain -d user -s $KEYCHAIN_PATH
                    
                    mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
                    tar xzvf $PP_ARCHIVE -C $RUNNER_TEMP
                    for PROVISION in `ls $RUNNER_TEMP/*.mobileprovision`
                    do
                        UUID=`/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i $PROVISION)`
                        cp $PROVISION ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
                    done
            
                    security find-identity -v -p codesigning
                    ls -l ~/Library/MobileDevice/Provisioning\ Profiles   



            -   name: Clean workspace
                run: |
                    git clean -ffdx
                    npm cache clean --force

            -   name: Clean iOS Build Directory
                env:
                    WORKSPACE: ${{ secrets.WORKSPACE }}
                run: |
                    cd ios
                    xcodebuild clean -workspace $WORKSPACE -scheme $SCHEME -configuration Release -quiet
                    cd ..        

            -   name: Build Archive
                env:
                    WORKSPACE: ${{ secrets.WORKSPACE }}
                    SCHEME: ${{ secrets.SCHEME }}
                    XCARCHIVE_NAME: ${{ secrets.XCARCHIVE_NAME }}
                run: |
                    cd ios
                    xcodebuild -workspace $WORKSPACE -scheme $SCHEME -sdk iphoneos -configuration Release archive -archivePath $PWD/build/$XCARCHIVE_NAME archive

            -   name: Export Archive
                env:
                    XCARCHIVE_NAME: ${{ secrets.XCARCHIVE_NAME }}
                run: |
                    cd ios
                    xcodebuild -exportArchive -archivePath $PWD/build/$XCARCHIVE_NAME -exportOptionsPlist ExportOptions.plist -exportPath $PWD/build/app.ipa

            -   name: Upload build to GitHub for download
                uses: actions/upload-artifact@v3
                with:
                    name: "app.ipa"
                    path: "ios/build/app.ipa"
                    if-no-files-found: error